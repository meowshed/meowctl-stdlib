name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Check / Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Check formatting
        run: mise run lint

  component-check:
    name: Check / Components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - uses: actions/setup-go@v6
        with:
          go-version-file: meowctl/go.mod
          cache-dependency-path: meowctl/go.sum

      - name: Build meowctl
        working-directory: meowctl
        run: CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl

      - name: Check all components
        run: meowctl/meowctl component check stdlib/components

  pm-contract:
    name: Check / PM contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - uses: actions/setup-go@v6
        with:
          go-version-file: meowctl/go.mod
          cache-dependency-path: meowctl/go.sum

      - name: Run PM contract tests
        working-directory: meowctl
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
        run: CGO_ENABLED=0 go test -tags integration -count=1 -v ./internal/lifecycle/...

  integration-ubuntu:
    name: Integration / Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - uses: actions/setup-go@v6
        with:
          go-version-file: meowctl/go.mod
          cache-dependency-path: meowctl/go.sum

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (apt)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-apt test-mise test-npm test-python test-gem test-cargo test-go test-luarocks test-github test-fish test-flatpak

  integration-fedora:
    name: Integration / Fedora
    runs-on: ubuntu-latest
    container: fedora:latest
    env:
      HOME: /root
    steps:
      - name: Install git and Go toolchain deps
        run: dnf install -y git golang sudo

      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (dnf)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-dnf test-mise test-npm test-python test-gem test-cargo test-go test-luarocks test-github

  integration-arch:
    name: Integration / Arch
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      HOME: /root
    steps:
      - name: Install git and Go toolchain deps
        run: pacman -Syu --noconfirm git go sudo

      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (pacman)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-pacman test-mise test-npm test-python test-gem test-cargo test-go test-luarocks test-github

  integration-alpine:
    name: Integration / Alpine (apk)
    runs-on: ubuntu-latest
    container: alpine:latest
    env:
      HOME: /root
    steps:
      - name: Install git and Go toolchain deps
        run: apk add --no-cache git go bash sudo

      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (apk)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-apk test-mise test-npm test-python test-gem test-cargo test-go test-luarocks test-github

  integration-macos:
    name: Integration / macOS (brew)
    runs-on: macos-latest
    steps:
      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - uses: actions/setup-go@v6
        with:
          go-version-file: meowctl/go.mod
          cache-dependency-path: meowctl/go.sum

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (brew)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-brew test-mise test-npm test-python test-gem test-cargo test-go test-luarocks test-github test-mas

  secrets:
    name: Secrets (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@7dc056a193116ba8d82154bf0549381c8fb8545c # v3.88.14
        with:
          extra_args: --results=verified,unknown
