name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pm-contract:
    name: PM contract tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          working_directory: meowctl

      - name: Run PM contract tests
        working-directory: meowctl
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
        run: CGO_ENABLED=0 go test -tags integration -count=1 -v ./internal/lifecycle/...

  integration-ubuntu:
    name: Integration / Ubuntu (apt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          working_directory: meowctl

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (apt)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-apt test-mise test-npm test-pipx test-gem test-cargo test-go test-uv test-luarocks test-github-release

  integration-fedora:
    name: Integration / Fedora (dnf)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install git and Go toolchain deps
        run: dnf install -y git golang

      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (dnf)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-dnf test-mise test-npm test-pipx test-gem test-cargo test-go test-uv test-luarocks test-github-release

  integration-arch:
    name: Integration / Arch (pacman)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install git and Go toolchain deps
        run: pacman -Syu --noconfirm git go

      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (pacman)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-pacman test-mise test-npm test-pipx test-gem test-cargo test-go test-uv test-luarocks test-github-release

  integration-alpine:
    name: Integration / Alpine (apk)
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Install git and Go toolchain deps
        run: apk add --no-cache git go bash

      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (apk)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-apk test-mise test-npm test-pipx test-gem test-cargo test-go test-uv test-luarocks test-github-release

  integration-macos:
    name: Integration / macOS (brew)
    runs-on: macos-latest
    steps:
      - name: Checkout meowctl-stdlib
        uses: actions/checkout@v4
        with:
          path: stdlib

      - name: Checkout meowctl
        uses: actions/checkout@v4
        with:
          repository: meowshed/meowctl
          path: meowctl

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          working_directory: meowctl

      - name: Build and install meowctl
        working-directory: meowctl
        run: |
          CGO_ENABLED=0 go build -o meowctl ./cmd/meowctl
          mkdir -p "$HOME/.local/bin"
          install -m755 meowctl "$HOME/.local/bin/meowctl"
          echo "MEOWCTL_BIN=$HOME/.local/bin/meowctl" >> "$GITHUB_ENV"

      - name: Smoke test (brew)
        env:
          STDLIB_PATH: ${{ github.workspace }}/stdlib
        run: |
          bash stdlib/scripts/pm-smoke-test.sh \
            test-brew test-mise test-npm test-pipx test-gem test-cargo test-go test-uv test-luarocks test-github-release

  secrets:
    name: Secrets (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@7dc056a193116ba8d82154bf0549381c8fb8545c # v3.88.14
        with:
          extra_args: --results=verified,unknown
